apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: a2a-human-in-loop
  namespace: a2a-human-in-loop
  labels:
    app: a2a-human-in-loop
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: a2a-human-in-loop
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
