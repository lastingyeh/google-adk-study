# Kubernetes 服務帳戶設定 (ServiceAccount)
# 用於賦予 Pod 特定的身分，以便與 Kubernetes API 或其他服務互動
apiVersion: v1
kind: ServiceAccount
metadata:
  name: guarding-agent # 服務帳戶名稱
  namespace: guarding-agent # 命名空間
