# Kubernetes 部署設定檔案 (Deployment Configuration)
# 定義如何部署 guarding-agent 到 Kubernetes 叢集
apiVersion: apps/v1
kind: Deployment
metadata:
  name: guarding-agent # 部署名稱：guarding-agent (守衛代理)
  namespace: guarding-agent # 指定命名空間
  labels:
    app: guarding-agent # 標籤：guarding-agent
spec:
  selector:
    matchLabels:
      app: guarding-agent # 選取具有此標籤的 Pod
  template:
    metadata:
      labels:
        app: guarding-agent # Pod 的標籤
    spec:
      serviceAccountName: guarding-agent # 使用指定的服務帳戶
      containers:
        - name: guarding-agent # 主容器：guarding-agent
          # 映像檔路徑：由 'make deploy' 或 CI/CD 流水線動態設定
          image: PLACEHOLDER
          ports:
            - containerPort: 8080 # 監聽連接埠 8080
              protocol: TCP
          env:
            - name: LOGS_BUCKET_NAME # 日誌存儲貯存格名稱
              value: ''
            - name: OTEL_INSTRUMENTATION_GENAI_CAPTURE_MESSAGE_CONTENT # OpenTelemetry 追蹤設定
              value: 'NO_CONTENT'
            - name: INSTANCE_CONNECTION_NAME # 資料庫實例連接名稱
              value: ''
            - name: DB_PASS # 資料庫密碼 (從 Secret 讀取)
              valueFrom:
                secretKeyRef:
                  name: guarding-agent-db-password
                  key: password
            - name: DB_NAME # 資料庫名稱
              value: 'guarding-agent'
            - name: DB_USER # 資料庫使用者
              value: 'guarding-agent'
          resources: # 資源限制與請求
            requests:
              cpu: '0.5'
              memory: '1Gi'
            limits:
              cpu: '1'
              memory: '2Gi'
          readinessProbe: # 就緒檢查 (Readiness Probe)
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe: # 存活檢查 (Liveness Probe)
            tcpSocket:
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
        - name: cloud-sql-proxy # 輔助容器：Cloud SQL 代理
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2.14.3
          args:
            - '--structured-logs'
            - '$(INSTANCE_CONNECTION_NAME)'
          env:
            - name: INSTANCE_CONNECTION_NAME
              value: ''
          securityContext:
            runAsNonRoot: true
          resources:
            requests:
              cpu: '0.5'
              memory: '512Mi'
            limits:
              cpu: '1'
              memory: '1Gi'
