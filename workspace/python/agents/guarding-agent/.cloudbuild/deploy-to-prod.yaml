steps:
  # Build and Push
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "-t",
        "$_REGION-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REGISTRY_REPO_NAME/$_CONTAINER_NAME:$SHORT_SHA",
        "--build-arg",
        "COMMIT_SHA=$COMMIT_SHA",
        ".",
      ]
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "push",
        "$_REGION-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REGISTRY_REPO_NAME/$_CONTAINER_NAME:$SHORT_SHA",
      ]

  # Deploy to Production GKE
  - name: "gcr.io/cloud-builders/gcloud"
    id: trigger-deployment
    entrypoint: /bin/bash
    args:
      - "-c"
      - |
        gcloud container clusters get-credentials ${_GKE_CLUSTER_NAME} --region ${_REGION} --project ${_PROD_PROJECT_ID}
        kubectl create namespace guarding-agent --dry-run=client -o yaml | kubectl apply -f -
        kubectl apply -f deployment/k8s/
        kubectl set image deployment/guarding-agent guarding-agent=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REGISTRY_REPO_NAME}/${_CONTAINER_NAME}:$SHORT_SHA -n guarding-agent
        EXTERNAL_IP=$(kubectl get svc guarding-agent -n guarding-agent -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
        [ -n "$EXTERNAL_IP" ] && kubectl set env deployment/guarding-agent APP_URL=http://$EXTERNAL_IP:8080 -n guarding-agent
        kubectl rollout status deployment/guarding-agent -n guarding-agent --timeout=300s

substitutions:
  _PROD_PROJECT_ID: YOUR_PROD_PROJECT_ID
  _REGION: us-central1

logsBucket: gs://${PROJECT_ID}-guarding-agent-logs/build-logs
options:
  substitutionOption: ALLOW_LOOSE
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET
