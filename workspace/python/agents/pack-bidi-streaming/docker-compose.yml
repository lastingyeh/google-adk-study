services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: adk_sessions
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U app -d adk_sessions" ]
      interval: 5s
      timeout: 5s
      retries: 10

  fastapi:
    build:
      context: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 8080
      SESSION_BACKEND: postgres
      SESSION_SERVICE_URI: postgresql+asyncpg://app:app@postgres:5432/adk_sessions
      DEMO_AGENT_MODEL: ${DEMO_AGENT_MODEL:-gemini-live-2.5-flash}
      GOOGLE_GENAI_USE_VERTEXAI: ${GOOGLE_GENAI_USE_VERTEXAI:-TRUE}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT:-}
      GOOGLE_CLOUD_LOCATION: ${GOOGLE_CLOUD_LOCATION:-us-central1}
      LOGS_BUCKET_NAME: ${LOGS_BUCKET_NAME:-}
    ports:
      - "8080:8080"

volumes:
  postgres_data:
